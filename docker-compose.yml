services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: autoapply
      POSTGRES_PASSWORD: password
      POSTGRES_DB: autoapply_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autoapply -d autoapply_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/code
      - ./uploads:/code/uploads
    command: uvicorn autoapply.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
